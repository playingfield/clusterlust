#!/usr/bin/env ansible-playbook
---
# ~/.kube/config should be valid
- name: Manage Storage
  hosts: kube_node
  become: true
  gather_facts: true
  tasks:
    - name: Manage OpenEBS
      ansible.builtin.include_role:
        name: clusterlust.openebs
        tasks_from: preparation

    - name: Manage LVM
      when: openebs_release_values.engines.local.lvm | bool
      ansible.builtin.include_role:
        name: clusterlust.openebs
        tasks_from: lvm

    - name: Manage ZFS
      when: openebs_release_values.engines.local.zfs | bool
      ansible.builtin.include_role:
        name: clusterlust.openebs
        tasks_from: zfs

- name: Manage Storage
  hosts: localhost
  become: false
  gather_facts: true
  vars:
    # Semaphore does not pass $HOME so K8S_AUTH_KUBECONFIG needs to be set.
    k8s_auth_kubeconfig: /home/semaphore/.kube/config
  tasks:
    - name: Manage OpenEBS
      ansible.builtin.include_role:
        name: clusterlust.openebs
        tasks_from: installation
